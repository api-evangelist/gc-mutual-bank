    type: OpenAPI
  description: Consumer-authorized Consumer Data Right payees surface exposing GET
    /banking/payees (the member's saved payees list) and GET /banking/payees/{payeeId}
    for full payee detail. Access requires an accredited data recipient (ADR) acting
    on a consumer's authorization under the CDR consent model. The contract is the
    shared DSB Consumer Data Standards CDR Banking API v1.36.0, not a bank-proprietary
    specification.
