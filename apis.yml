    type: OpenAPI
  description: Consumer-authorized Consumer Data Right transactions surface exposing
    GET /banking/accounts/{accountId}/transactions (with filtering by date, amount,
    and text) and GET /banking/accounts/{accountId}/transactions/{transactionId} for
    full transaction detail. Access requires an accredited data recipient (ADR) acting
    on a consumer's authorization under the CDR consent model. The contract is the
    shared DSB Consumer Data Standards CDR Banking API v1.36.0, not a bank-proprietary
    specification.
