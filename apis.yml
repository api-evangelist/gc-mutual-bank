apis:
- aid: gc-mutual-bank:gc-mutual-bank-cdr-product-reference-data-api
  name: G&C Mutual Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Public API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://unity.bank/about-us/corporate-information/open-banking/
  baseURL: https://ibank.gcmutualbank.com.au/openbanking/cds-au/v1
  properties:
  - url: https://unity.bank/about-us/corporate-information/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/gc-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API exposing G&C Mutual Bank's banking products - eligibility, features, pricing,
    rates, and links to terms - via GET /banking/products and GET /banking/products/{productId}
    under the standard CDS path /cds-au/v1/banking/products. Confirmed live returning
    HTTP 200 with 25 products at supported header version x-v 4 (x-v 4 and 5 available).
    The contract is the shared DSB Consumer Data Standards CDR Banking API, not a bank-proprietary
    specification.
