apis:
- aid: gc-mutual-bank:gc-mutual-bank-cdr-product-reference-data-api
  name: G&C Mutual Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Public API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://unity.bank/about-us/corporate-information/open-banking/
  baseURL: https://ibank.gcmutualbank.com.au/openbanking/cds-au/v1/banking/products
  properties:
  - url: https://unity.bank/about-us/corporate-information/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/gc-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API exposing G&C Mutual Bank's banking products - eligibility, features, pricing,
    rates, and links to terms - via GET /banking/products and GET /banking/products/{productId}
    under the standard CDS path /cds-au/v1/banking/products. Confirmed live returning
    HTTP 200 at supported header version x-v 4 (x-v 4 and 5 available; x-v 3 rejected
    406 UnsupportedVersion). The contract is the shared DSB Consumer Data Standards
    CDR Banking API, not a bank-proprietary specification.
- aid: gc-mutual-bank:gc-mutual-bank-cdr-accounts-balances-api
  name: G&C Mutual Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://unity.bank/about-us/corporate-information/open-banking/
  baseURL: https://ibank.gcmutualbank.com.au/openbanking/cds-au/v1/banking/accounts
  properties:
  - url: https://unity.bank/about-us/corporate-information/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: APIReference
  - url: openapi/gc-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right accounts and balances surface
    exposing GET /banking/accounts, GET /banking/accounts/balances (bulk), GET /banking/accounts/{accountId}/balance,
    and GET /banking/accounts/{accountId} (account detail). Access requires an accredited
    data recipient (ADR) acting on a consumer's authorization under the CDR consent
    model; unauthenticated calls are rejected with HTTP 401 (confirmed live). The contract
    is the shared DSB Consumer Data Standards CDR Banking API v1.36.0, not a bank-proprietary
    specification.
