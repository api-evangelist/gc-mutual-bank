name: G&C Mutual Bank
kind: company
description: G&C Mutual Bank is an Australian customer-owned mutual bank and authorised
  deposit-taking institution (ADI) providing retail and business banking to its members,
  including home loans, transaction and savings accounts, and credit cards. It merged
  with Unity Bank effective 7 March 2025, with the combined entity renamed Unity Bank
  Limited from 1 July 2025; the G&C Mutual Bank brand and its digital banking host
  (gcmutualbank.com.au) remain operational during the multi-brand consolidation, while
  the public website gcmutual.bank now redirects to unity.bank. Under Australia's Consumer
  Data Right (CDR / Open Banking) the bank exposes a public, unauthenticated Product
  Reference Data (PRD) API conforming to the Data Standards Body (DSB) Consumer Data
  Standards, alongside the authenticated consumer-data (accounts and transactions)
  surface that is restricted to accredited data recipients under the CDR ADR model.
