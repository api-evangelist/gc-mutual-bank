    type: OpenAPI
  description: Consumer-authorized Consumer Data Right recurring-payments surface exposing
    direct debits (GET /banking/accounts/{accountId}/direct-debits and the bulk POST
    /banking/accounts/direct-debits) and scheduled payments (GET /banking/accounts/{accountId}/payments/scheduled
    and the bulk POST /banking/payments/scheduled). Access requires an accredited data
    recipient (ADR) acting on a consumer's authorization under the CDR consent model.
    The contract is the shared DSB Consumer Data Standards CDR Banking API v1.36.0,
    not a bank-proprietary specification.
